<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>combowolf</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c10;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #e0e0e0;
  --muted: #888;
  --accent-anime: #ff6b9d;
  --accent-minimalistic: #4fc3f7;
  --accent-cartoony: #c6ff00;
  --white: #fff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

main {
  max-width: 740px;
  margin: auto;
  padding: 60px 24px 100px;
}

.hero { display: flex; gap: 20px; margin-bottom: 30px; }
.pfp { width: 80px; height: 80px; border-radius: 50%; }

.hero-text h1 { font-size: 48px; }
.hero-text p { font-size: 13px; color: var(--muted); }

.divider {
  height: 1px;
  background: var(--border);
  margin: 30px 0;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tab {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
}

.tab.active { color: white; border-color: white; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
}

.card img { width: 100%; }

.card-body { padding: 10px; }
.card-title { color: white; }

.hidden { display: none; }

/* Pricing Section */
.pricing {
  display: none;
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 10px;
  background: var(--surface);
}

.pricing.active { display: block; }

.pricing h2 {
  margin-bottom: 10px;
}

.pricing p {
  margin: 6px 0;
  color: var(--muted);
}

.status {
  margin-top: 12px;
  font-weight: bold;
  color: #00ff9d;
}

/* Contact */
.contact {
  margin-top: 40px;
}

.btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #5865F2;
  border: none;
  color: white;
  cursor: pointer;
}

/* Modal */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
}
</style>
</head>

<body>
<main>

<div class="hero">
  <img src="Grey Wolf.jpeg" class="pfp">
  <div class="hero-text">
    <h1>COMBOWOLF</h1>
    <p>UI Artist <span>I Mostly Specialize In Cartoony/Minimalistic GUI</span></p>
  </div>
</div>

<div class="divider"></div>

<div class="tabs">
  <button class="tab active" onclick="showSection('portfolio')">Portfolio</button>
  <button class="tab" onclick="showSection('pricing')">Pricing</button>
</div>

<!-- PORTFOLIO -->
<div id="portfolioSection">
  <div class="grid">

    <div class="card">
      <img src="Portfolio_work_3.png">
      <div class="card-body"><div class="card-title">Shop UI</div></div>
    </div>

    <div class="card">
      <img src="Portfolio_work_2.png">
      <div class="card-body"><div class="card-title">Cash Packs</div></div>
    </div>

  </div>
</div>

<!-- PRICING -->
<div id="pricingSection" class="pricing">
  <h2>Pricing</h2>

  <p>💰 Price: <strong>4500 R$ / $15</strong></p>
  <p>📌 50% upfront payment required before starting</p>
  <p>⚠️ 25% of payment is non-refundable</p>

  <div class="status">🟢 Commissions: OPEN</div>
</div>

<!-- CONTACT -->
<div class="contact">
  <p>Want a UI made?</p>
  <button class="btn" onclick="window.open('https://discord.com/users/1399070196869763155')">
    Contact Me
  </button>
</div>

</main>

<!-- MODAL -->
<div id="modal">
  <img id="modalImg">
</div>

<script>
// Switch sections
function showSection(section) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('portfolioSection').style.display =
    section === 'portfolio' ? 'block' : 'none';

  document.getElementById('pricingSection').classList.toggle('active',
    section === 'pricing');
}

// Modal
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

document.querySelectorAll('.card img').forEach(img => {
  img.onclick = () => {
    modal.style.display = 'flex';
    modalImg.src = img.src;
  };
});

modal.onclick = () => modal.style.display = 'none';
</script>

</body>
</html>
