<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>combowolf</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c10;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e0e0e0;
      --muted: #888;
      --accent-anime: #ff6b9d;
      --accent-real: #4fc3f7;
      --accent-funky: #c6ff00;
      --white: #fff;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    main { position: relative; z-index: 1; max-width: 740px; margin: 0 auto; padding: 60px 24px 100px; }

    .hero {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }
    .pfp {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a2a;
    }
    .hero-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 4px;
      color: var(--white);
      line-height: 1;
    }
    .hero-text p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .hero-text p span { color: var(--text); }

    .divider {
      width: 100%; height: 1px;
      background: var(--border);
      margin: 36px 0;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.2s ease both;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
    .tab.active[data-cat="anime"]     { color: var(--accent-anime);  border-color: var(--accent-anime);  background: rgba(255,107,157,0.08); }
    .tab.active[data-cat="realistic"] { color: var(--accent-real);   border-color: var(--accent-real);   background: rgba(79,195,247,0.08); }
    .tab.active[data-cat="funky"]     { color: var(--accent-funky);  border-color: var(--accent-funky);  background: rgba(198,255,0,0.08); }
    .tab.active[data-cat="all"]       { color: var(--white); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .card {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover { transform: translateY(-4px); }
    .card[data-cat="anime"]:hover     { border-color: var(--accent-anime);  box-shadow: 0 8px 32px rgba(255,107,157,0.15); }
    .card[data-cat="realistic"]:hover { border-color: var(--accent-real);   box-shadow: 0 8px 32px rgba(79,195,247,0.15); }
    .card[data-cat="funky"]:hover     { border-color: var(--accent-funky);  box-shadow: 0 8px 32px rgba(198,255,0,0.15); }

    .card-thumb {
      width: 100%; aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
    }

    .card-placeholder {
      width: 100%; aspect-ratio: 16/10;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .card[data-cat="anime"]     .card-placeholder { background: linear-gradient(135deg,#1a0a14,#2d0f20); }
    .card[data-cat="realistic"] .card-placeholder { background: linear-gradient(135deg,#050e1a,#0d2233); }
    .card[data-cat="funky"]     .card-placeholder { background: linear-gradient(135deg,#0e1200,#1e2800); }

    .card-body { padding: 14px 16px; }
    .card-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .card[data-cat="anime"]     .card-label { color: var(--accent-anime); }
    .card[data-cat="realistic"] .card-label { color: var(--accent-real); }
    .card[data-cat="funky"]     .card-label { color: var(--accent-funky); }

    .card-title { font-size: 14px; font-weight: 700; color: var(--white); }

    .card.hidden { display: none; }

    .contact {
      margin-top: 48px;
      padding: 28px 32px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    .contact-left p:first-child { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
    .contact-left p:last-child  { font-size: 13px; color: var(--muted); }

    .btn {
      padding: 11px 24px;
      border-radius: 7px;
      border: none;
      background: #5865F2;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .btn:hover  { background: #4752c4; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .hero-text h1 { font-size: 40px; }
    }
  </style>
</head>
<body>
<main>

  <div class="hero">
    <img src="Grey Wolf.jpeg" class="pfp" alt="combowolf" onerror="this.style.background='#1e1e30'"/>
    <div class="hero-text">
      <h1>COMBOWOLF</h1>
      <p>UI Artist <span>1+ Year Experience</span> profesional </p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="tabs">
    <button class="tab active" data-cat="all"        onclick="filter('all')">All</button>
    <button class="tab"        data-cat="anime"       onclick="filter('anime')">Anime</button>
    <button class="tab"        data-cat="realistic"   onclick="filter('realistic')">Realistic</button>
    <button class="tab"        data-cat="funky"       onclick="filter('funky')">Brainrot</button>
  </div>

  <div class="grid" id="grid">

    <div class="card" data-cat="anime">
      <img src="Anime333.png" class="card-thumb" >
      <div class="card-body">
        <div class="card-label">Anime</div>
        <div class="card-title">Coin Pack</div>
      </div>
    </div>

    <div class="card" data-cat="anime">
      <img src="Portfolio_work_1.png" class="card-thumb" >
      <div class="card-body">
        <div class="card-label">Anime</div>
        <div class="card-title">Store Gui</div>
      </div>
    </div>



    <div class="card" data-cat="funky">
      <img src="Portfolio_work_4.png" class="card-thumb">
      <div class="card-body">
        <div class="card-label">Brainrot</div>
        <div class="card-title">Store Gui</div>
      </div>
    </div>

    <div class="card" data-cat="funky">
      <img src="Portfolio_work_5.png" class="card-thumb" >
      <div class="card-body">
        <div class="card-label">Brainrot</div>
        <div class="card-title">Rebirth Gui</div>
      </div>
    </div>
        <div class="card" data-cat="funky">
      <img src="Portfolio_work_6.png" class="card-thumb" >
      <div class="card-body">
        <div class="card-label">Brainrot</div>
        <div class="card-title">Upgrades Gui</div>
      </div>
    </div>

  </div>

  <div class="contact">
    <div class="contact-left">
      <p>Want a UI made?</p>
      <p>Contact me on dicord</p>
    </div>
    <button class="btn" onclick="window.open('https://discord.com/users/1399070196869763155','_blank')">Contact Me</button>
  </div>

</main>

<script>
  function filter(cat) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.cat === cat);
    });
    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('hidden', cat !== 'all' && card.dataset.cat !== cat);
    });
  }
</script>
</body>
</html>
